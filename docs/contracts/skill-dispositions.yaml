# Skill dispositions — canonical per-skill DDD/disposition data
#
# Source of truth for the Full Skill Map in
# docs/reference/agentops-skill-domain-map.md.  That .md file is
# regenerated from this yaml + skills/*/SKILL.md frontmatter by
# scripts/generate-skill-domain-map.sh.  Do not hand-edit the table in
# the .md file — edit this yaml and regenerate.
#
# Phase 3 of soc-zxia (registries-drift remediation).
#
# Schema per row:
#   skill           skill slug (matches skills/<slug>/SKILL.md name)
#   domain          "BC<n> <Name>" — must match docs/contracts/bounded-contexts.yaml
#   hexagonal_role  domain | driving-adapter | driven-adapter | supporting | generic
#                   (must match the skill's SKILL.md frontmatter hexagonal_role)
#   disposition     keep | update | refactor | merge-review | cut-review
#   rationale       one-line justification for the disposition

