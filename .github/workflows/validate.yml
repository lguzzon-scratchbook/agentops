  factory-claim-ledger-strict:
    # Wave 1C of epic soc-e4ulx (Reconciliation Engine).
    # Bead: soc-lmww1. Plan: .agents/plans/2026-05-07-reconciliation-engine-full-arc.md
    # Advisory-only: failures here MUST NOT fail the PR check. Promotion to
    # blocking is gated on Wave 1E structured sampling, not wall-clock time.
    # NOTE: `merged_anyway` and `ledger_updated` (referenced in the plan's
    # observation schema) cannot be set during PR CI — they are backfilled by
    # Wave 1E aggregation or by the operator post-merge. We emit only the
    # fields the runner can know: run_id, pr_number, verdict, surfaces_touched,
    # timestamp. Aggregation into .agents/reconcile/observation-log.jsonl is
    # explicitly out of scope for this wave; observations are published as a
    # workflow artifact instead of committed back to the repo.
    needs: [changes]
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.contracts == 'true' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.markdown == 'true'
    name: factory-claim-ledger-strict (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install jq (for observation construction)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi

      - name: Run factory claim-ledger validator
        id: validator
        continue-on-error: true
        run: |
          set +e
          bash scripts/check-factory-claim-ledger.sh
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            verdict=pass
          else
            verdict=fail
          fi
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Do not propagate non-zero — continue-on-error keeps this advisory.
          exit 0

      - name: Emit structured observation
        id: observation
        continue-on-error: true
        env:
          VERDICT: ${{ steps.validator.outputs.verdict }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/factory-claim-ledger"
          out="$RUNNER_TEMP/factory-claim-ledger/observation.jsonl"

          # Compute touched surfaces relative to the validator's source-set.
          # On pull_request: diff base..head. On push: diff HEAD~1..HEAD as a
          # reasonable approximation. Filter against the source-set patterns
          # collected by scripts/check-factory-claim-ledger.sh.
          if [ -n "${BASE_SHA:-}" ]; then
            range="${BASE_SHA}..${HEAD_SHA}"
          else
            range="HEAD~1..HEAD"
          fi

          changed_files="$(git diff --name-only "$range" 2>/dev/null || true)"

          # Source-set patterns mirror collect_repo_sources() in the validator.
          surfaces="$(printf '%s\n' "$changed_files" | awk '
            /^README\.md$/                                ||
            /^PRODUCT\.md$/                                ||
            /^GOALS\.md$/                                  ||
            /^docs\/index\.md$/                            ||
            /^docs\/agentops-brief\.md$/                   ||
            /^docs\/assurance-profile\.md$/                ||
            /^docs\/software-factory\.md$/                 ||
            /^docs\/trust-factory\.md$/                    ||
            /^docs\/wiki-for-agents\.md$/                  ||
            /^docs\/comparisons\/.*\.md$/                  ||
            /^docs\/contracts\/factory-.*\.md$/
          ')"

          # Build a JSON array of surfaces (jq handles empty input safely).
          surfaces_json="$(printf '%s\n' "$surfaces" | jq -R . | jq -s 'map(select(length > 0))')"

          jq -n \
            --arg run_id "${GITHUB_RUN_ID:-}" \
            --arg pr_number "${PR_NUMBER:-}" \
            --arg verdict "${VERDICT:-unknown}" \
            --argjson surfaces_touched "$surfaces_json" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              "run_id": $run_id,
              "pr_number": (if $pr_number == "" then null else $pr_number end),
              "verdict": $verdict,
              "surfaces_touched": $surfaces_touched,
              "timestamp": $timestamp
            }' > "$out"

          echo "Observation:"
          cat "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Upload claim-ledger observation artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: factory-claim-ledger-observation
          path: ${{ runner.temp }}/factory-claim-ledger/
          retention-days: 30
          if-no-files-found: warn

  eval-skill-delta:
