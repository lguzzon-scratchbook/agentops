          echo "validate-hooks-doc-parity: ${{ needs.validate-hooks-doc-parity.result }}"
          echo "hook-output-schema-lint: ${{ needs.hook-output-schema-lint.result }}"
          echo "validate-ci-policy-parity: ${{ needs.validate-ci-policy-parity.result }}"
          echo "validate-codex-runtime-sections: ${{ needs.validate-codex-runtime-sections.result }}"
          echo "validate-codex-generated-artifacts: ${{ needs.validate-codex-generated-artifacts.result }}"
          echo "validate-codex-backbone-prompts: ${{ needs.validate-codex-backbone-prompts.result }}"
